server {
    listen 80;
    server_name serverpulse.company.com; # Replace with your domain or IP address

    # Root directory pointing to the built frontend
    root /var/www/serverpulse/frontend/dist;
    index index.html index.htm;

    # Compression config
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Serve built static frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for local Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3971/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy for local health check
    location /health {
        proxy_pass http://127.0.0.1:3971/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
