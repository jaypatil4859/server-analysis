version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Server Analysis Analytics — Docker Compose Stack
#
# Uses the REMOTE production MongoDB at 217.145.69.228 (no local DB container).
# Data source: Nagios Bridge (polls Nagios every 30s)
#
# Quick start:
#   1. Copy .env.example to .env and fill in NAGIOS_PASS and MONGODB_URI
#   2. docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Node Express Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: server-analysis-backend
    restart: unless-stopped
    ports:
      - "3971:3971"
    environment:
      - PORT=3971
      # Remote production MongoDB (set in .env or override here)
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:dMY8Rp0(K9S7Hy@217.145.69.228:27017/server_analysis?authSource=admin}
      - SEED_DUMMY_HISTORY=false
      # Optional notification integrations
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL_RECIPIENT=${ALERT_EMAIL_RECIPIENT}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}

  # ─── React/Vite Frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: server-analysis-frontend
    restart: unless-stopped
    ports:
      - "3970:80"
    depends_on:
      - backend

  # ─── Nagios Bridge (Primary Data Collector) ─────────────────────────────────
  # Polls Nagios statusjson.cgi every 30 seconds and forwards real server metrics
  # (CPU, RAM, Load) to the backend API.
  nagios-bridge:
    image: node:20-alpine
    container_name: server-analysis-nagios-bridge
    restart: unless-stopped
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    depends_on:
      - backend
    environment:
      - NAGIOS_URL=${NAGIOS_URL:-http://217.145.69.228/nagios}
      - NAGIOS_USER=${NAGIOS_USER:-nagiosadmin}
      - NAGIOS_PASS=${NAGIOS_PASS}
      - METRICS_API_URL=http://backend:3971/api/metrics
      - POLL_INTERVAL_MS=30000
      # MongoDB fallback URI (used if backend is temporarily unreachable)
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:dMY8Rp0(K9S7Hy@217.145.69.228:27017/server_analysis?authSource=admin}
    command: >
      sh -c "cd /usr/src/app &&
             npm install --prefix backend --only=production 2>/dev/null || true &&
             node nagios-bridge.js"

# ─── NOTE: Local MongoDB removed ─────────────────────────────────────────────
# The production MongoDB is hosted externally at 217.145.69.228.
# There is no need for a local database container.
# If you want a fully local test environment, add:
#
#   database:
#     image: mongo:7.0
#     container_name: server-analysis-db
#     restart: unless-stopped
#     ports:
#       - "27017:27017"
#     volumes:
#       - mongodb_data:/data/db
#
# And change MONGODB_URI to: mongodb://database:27017/server_analysis
