version: '3.8'

services:
  # MongoDB Database Service
  database:
    image: mongo:7.0
    container_name: serverpulse-db
    restart: unless-stopped
    ports:
      - "27017:27017" # Exposes DB for external check or direct access
    environment:
      - MONGO_INITDB_DATABASE=server_analysis
    volumes:
      - mongodb_data:/data/db

  # Node Express Backend API Service
  backend:
    build:
      context: ./backend
    container_name: serverpulse-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - database
    environment:
      - PORT=5000
      # Connects to database service hostname defined in this docker-compose
      - MONGODB_URI=mongodb://database:27017/server_analysis
      # Notification integrations (configured via .env in root if needed)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL_RECIPIENT=${ALERT_EMAIL_RECIPIENT}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}

  # Nginx Frontend Web Service
  frontend:
    build:
      context: ./frontend
    container_name: serverpulse-frontend
    restart: unless-stopped
    ports:
      - "80:80" # Exposed HTTP port on the host
    depends_on:
      - backend

  # Centralized SSH Real-Time Collector
  collector:
    image: node:18-alpine
    container_name: serverpulse-collector
    restart: unless-stopped
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      # Mount the SSH private key from the host into the container (change path as needed)
      - ${SSH_KEY_PATH:-/home/devops/.ssh/id_rsa}:/root/.ssh/id_rsa:ro
    depends_on:
      - backend
    environment:
      - METRICS_API_URL=http://backend:5000/api/metrics
      - POLL_INTERVAL_MS=10000 # Real-time poll interval (10 seconds)
      - SSH_USER=${SSH_USER:-root}
      - SSH_KEY_PATH=/root/.ssh/id_rsa_temp
    command: >
      sh -c "mkdir -p /root/.ssh && 
             chmod 700 /root/.ssh && 
             cp /root/.ssh/id_rsa /root/.ssh/id_rsa_temp && 
             chmod 600 /root/.ssh/id_rsa_temp && 
             node ssh-collector.js"

volumes:
  mongodb_data:
    driver: local
